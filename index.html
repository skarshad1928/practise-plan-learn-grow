<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certification Tracker</title>

<style>
body {
  font-family: Arial;
  background: #1e3c72;
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px;
  margin-top: 5px;
  cursor: pointer;
}

.task {
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
}

.completed { background: green; }
.incomplete { background: red; }
</style>

</head>

<body>

<div class="container">

<h1>Certification Tracker</h1>

<div class="card">
<h2>Add Task</h2>
<input id="taskName" placeholder="Task Name">
<textarea id="taskDesc" placeholder="Description"></textarea>
<input id="fileName" placeholder="File Name">
<input id="fileLink" placeholder="File Link">

<select id="source">
<option>Coursera</option>
<option>AWS</option>
<option>Other</option>
</select>

<button onclick="addTask()">Add Task</button>
<button onclick="downloadTasks()">Download Tasks (.txt)</button>
</div>

<div class="card">
<h2>Tasks</h2>
<div id="taskList"></div>
</div>

</div>

<script>

// Load from localStorage
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

// Save function
function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

// Add task
function addTask() {
  const task = {
    id: Date.now(),
    name: taskName.value,
    desc: taskDesc.value,
    file: fileName.value,
    link: fileLink.value,
    source: source.value,
    completed: false
  };

  tasks.push(task);
  save();
  render();
}

// Toggle complete
function toggleTask(id) {
  tasks = tasks.map(t => {
    if (t.id === id) t.completed = !t.completed;
    return t;
  });
  save();
  render();
}

// Delete task
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

// Render tasks
function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task " + (t.completed ? "completed" : "incomplete");

    div.innerHTML = `
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <p><b>File:</b> ${t.file}</p>
      <p><a href="${t.link}" target="_blank">Open Link</a></p>
      <p><b>Source:</b> ${t.source}</p>
      <button onclick="toggleTask(${t.id})">Toggle</button>
      <button onclick="deleteTask(${t.id})">Delete</button>
    `;

    list.appendChild(div);
  });
}

// Download as .txt file
function downloadTasks() {
  let text = JSON.stringify(tasks, null, 2);

  const blob = new Blob([text], { type: "text/plain" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tasks.txt";
  a.click();
}

// Initial render
render();

</script>

</body>
</html>
